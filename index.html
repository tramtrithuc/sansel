<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo Link Hoàn Tiền Shopee</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:25px 15px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    border-radius:16px;
    padding:28px 20px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:#ee4d2d;
    font-size:32px;
    margin-bottom:25px;
    font-weight:bold;
}

input[type=text]{
    width:100%;
    height:50px;
    padding:0 15px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
    outline:none;
    transition:.2s;
}

input[type=text]:focus{
    border-color:#ee4d2d;
}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    transition:.2s;
}

button:hover{
    transform:translateY(-1px);
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}

#generateBtn{
    background:#ee4d2d;
    color:#fff;
}

#generateBtn:hover{
    background:#d73211;
}

.result-box{
    display:none;
    margin-top:22px;
    border:2px dashed #ff8a65;
    border-radius:12px;
    padding:18px;
    background:#fffdfc;
}

.status-text{
    margin-top:10px;
    text-align:center;
    font-weight:bold;
    color:#555;
    font-size:16px;
}

.btn-copy{
    width:100%;
    margin-top:18px;
    background:#0d6efd;
    color:#fff;
}

.btn-copy:hover{
    background:#0b5ed7;
}

.btn-buy{
    display:none;
    width:100%;
    margin-top:12px;
    height:50px;
    line-height:50px;
    text-align:center;
    text-decoration:none;
    border-radius:8px;
    background:#3cb521;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    transition:.2s;
}

.btn-buy:hover{
    background:#2fa117;
}

@media(max-width:480px){
    .container{
        padding:20px 16px;
    }
    h1{
        font-size:26px;
    }
    button,
    .btn-buy{
        font-size:17px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>Tạo Link Hoàn Tiền</h1>

<input
type="text"
id="shopeeLink"
placeholder="Nhập link sản phẩm Shopee..."
>
<input
    type="text"
    id="subId"
    placeholder="Nhập số Zalo / Tên người nhận..."
    style="margin-top:8px;"
>
<button
id="generateBtn"
onclick="generateAffLink()">
Tạo Link Ngay
</button>

<div class="result-box" id="resultBox">
    
    <p class="status-text" id="statusText">⏳ Đang xử lý...</p>

    <input type="hidden" id="outputLink">

    <button
    id="copyBtn"
    class="btn-copy"
    onclick="copyToClipboard()"
    disabled>
    Đang xử lý...
    </button>

    <a
    id="buyBtn"
    class="btn-buy"
    href="#"
    target="_blank"
    style="display:none;">
    🛒 Mua ngay
    </a>

</div>

</div>

<script>
let isLoading = false;

async function generateAffLink() {
    if (isLoading) return;

    let inputLink = document.getElementById("shopeeLink").value.trim();
    let subId = document.getElementById("subId").value.trim();

    if (subId === "") {
        subId = "khach_le"; // Mã mặc định nếu khách không nhập gì
    }

    if (!inputLink) {
        alert("Vui lòng nhập link Shopee");
        return;
    }

    if (!inputLink.startsWith("http")) {
        inputLink = "https://" + inputLink;
    }

    isLoading = true;

    const btn = document.getElementById("generateBtn");
    const resultBox = document.getElementById("resultBox");
    const statusText = document.getElementById("statusText");
    const output = document.getElementById("outputLink");
    const copyBtn = document.getElementById("copyBtn");
    const buyBtn = document.getElementById("buyBtn");

    btn.disabled = true;
    btn.innerText = "Đang xử lý...";

    resultBox.style.display = "block";
    statusText.innerText = "⏳ Đang kết nối với hệ thống AccessTrade...";
    statusText.style.display = "block";
    copyBtn.disabled = true;
    buyBtn.style.display = "none";

    try {
        // Dùng proxy trung gian để không bị trình duyệt chặn lỗi CORS
        const apiUrl = "https://corsproxy.io/?https://api.accesstrade.vn/v1/product_link/create";
        
        const res = await fetch(apiUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Token 5T1WLRgD0tNK35nKgPJFipWfCBeHAt-r" // Mã API của bạn
            },
            body: JSON.stringify({
                "campaign_id": "4348614231480407268", // ID chiến dịch Shopee
                "urls": [inputLink],
                "utm_source": subId
            })
        });

        const data = await res.json();

        if (data && data.data && data.data.length > 0 && data.data[0].short_link) {
            const shortLink = data.data[0].short_link;

            output.value = shortLink; 

            buyBtn.href = shortLink;
            buyBtn.style.display = "block";

            statusText.innerText = "";
            statusText.style.display = "none";
            copyBtn.disabled = false;
            copyBtn.innerText = "📋 Sao chép Link";

        } else {
            console.log("Chi tiết lỗi:", data);
            throw new Error("Không tạo được link. Hãy kiểm tra xem bạn đã được duyệt chiến dịch Shopee trên AccessTrade chưa, hoặc link gốc không hợp lệ.");
        }

    } catch (err) {
        console.log(err);
        statusText.innerText = "❌ Lỗi: " + err.message;
        statusText.style.display = "block";
    }

    isLoading = false;
    btn.disabled = false;
    btn.innerText = "Tạo Link Ngay";
}

function copyToClipboard() {
    const copyText = document.getElementById("outputLink").value;
    navigator.clipboard.writeText(copyText);
    alert("Đã sao chép link thành công!");
}
</script>

</body>
</html>
