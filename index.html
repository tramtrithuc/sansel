<script>
let isLoading = false;

async function generateAffLink() {
    if (isLoading) return;

    let inputLink = document.getElementById("shopeeLink").value.trim();
    let subId = document.getElementById("subId").value.trim();

    if (subId === "") {
        subId = "khach_le"; // Mã mặc định nếu không nhập số Zalo
    }

    if (!inputLink) {
        alert("Vui lòng nhập link Shopee");
        return;
    }

    // Đảm bảo link luôn có https://
    if (!inputLink.startsWith("http")) {
        inputLink = "https://" + inputLink;
    }

    isLoading = true;

    const btn = document.getElementById("generateBtn");
    const resultBox = document.getElementById("resultBox");
    const statusText = document.getElementById("statusText");
    const output = document.getElementById("outputLink");
    const copyBtn = document.getElementById("copyBtn");
    const buyBtn = document.getElementById("buyBtn");
    const productCard = document.getElementById("productCard");

    btn.disabled = true;
    btn.innerText = "Đang xử lý...";

    resultBox.style.display = "block";
    productCard.style.display = "none"; 

    statusText.innerText = "⏳ Đang kết nối với AccessTrade...";
    statusText.style.display = "block";
    copyBtn.disabled = true;
    buyBtn.style.display = "none";

    try {
        // ĐÃ SỬA CHỖ NÀY: Thêm corsproxy.io để trình duyệt không chặn API
        const apiUrl = "https://corsproxy.io/?https://api.accesstrade.vn/v1/product_link/create";
        
        const res = await fetch(apiUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                // Token AccessTrade của bạn
                "Authorization": "Token 5T1WLRgD0tNK35nKgPJFipWfCBeHAt-r" 
            },
            body: JSON.stringify({
                "campaign_id": "4348614231480407268", // ID chiến dịch Shopee VN
                "urls": [inputLink],
                "utm_source": subId
            })
        });

        const data = await res.json();

        if (data && data.data && data.data.length > 0 && data.data[0].short_link) {
            const shortLink = data.data[0].short_link;

            output.value = shortLink; // Chỉ lưu link để copy cho gọn

            buyBtn.href = shortLink;
            buyBtn.style.display = "block";

            statusText.innerText = "";
            statusText.style.display = "none";
            copyBtn.disabled = false;
            copyBtn.innerText = "📋 Sao chép Link";

        } else {
            console.log("Dữ liệu trả về bị lỗi:", data);
            throw new Error("Lỗi API từ AccessTrade (Có thể sai Campaign ID hoặc link rác)");
        }

    } catch (err) {
        console.log(err);
        statusText.innerText = "❌ Lỗi: " + err.message;
        statusText.style.display = "block";
    }

    isLoading = false;
    btn.disabled = false;
    btn.innerText = "Tạo Link Ngay";
}

function copyToClipboard() {
    const copyText = document.getElementById("outputLink").value;
    navigator.clipboard.writeText(copyText);
    alert("Đã sao chép link: " + copyText);
}
</script>
