<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo Link Shopee</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:25px 15px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
    border-radius:16px;
    padding:28px 20px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:#ee4d2d;
    font-size:32px;
    margin-bottom:25px;
    font-weight:bold;
}

input[type=text]{
    width:100%;
    height:50px;
    padding:0 15px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:16px;
    outline:none;
    transition:.2s;
}

input[type=text]:focus{
    border-color:#ee4d2d;
}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    transition:.2s;
}

button:hover{
    transform:translateY(-1px);
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}

#generateBtn{
    background:#ee4d2d;
    color:#fff;
}

#generateBtn:hover{
    background:#d73211;
}

.result-box{
    display:none;
    margin-top:22px;
    border:2px dashed #ff8a65;
    border-radius:12px;
    padding:18px;
    background:#fffdfc;
}

/* ===========================
   Product Card
=========================== */

.product-card{
    display:none;
    background:#fff;
    border:1px solid #ececec;
    border-radius:12px;
    padding:14px;
    box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.product-card-content{
    display:flex;
    align-items:center;
    gap:12px;
}

.product-image{
    width:70px;
    height:70px;
    border-radius:8px;
    object-fit:cover;
    border:1px solid #ddd;
    flex-shrink:0;
}

.product-detail{
    flex:1;
    min-width:0;
}

.product-name{
    font-size:16px;
    font-weight:bold;
    color:#333;
    line-height:1.45;

    display:-webkit-box;
    -webkit-box-orient:vertical;
    -webkit-line-clamp:2;
    overflow:hidden;
}
.product-price{
    margin-top:6px;
    font-size:15px;
    color:#666;
    font-weight:500;
}
.product-commission{
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid #eee;

    text-align:center;

    font-size:18px;
    font-weight:bold;
    color:#ee4d2d;
}

/* ===========================
   Status
=========================== */

.status-text{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    color:#555;
    font-size:16px;
}

/* ===========================
   Buttons
=========================== */

.btn-copy{
    width:100%;
    margin-top:18px;
    background:#0d6efd;
    color:#fff;
}

.btn-copy:hover{
    background:#0b5ed7;
}

.btn-buy{
    display:none;
    width:100%;
    margin-top:12px;
    height:50px;
    line-height:50px;
    text-align:center;
    text-decoration:none;
    border-radius:8px;
    background:#3cb521;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    transition:.2s;
}

.btn-buy:hover{
    background:#2fa117;
}

/* ===========================
   Mobile
=========================== */

@media(max-width:480px){

    .container{
        padding:20px 16px;
    }

    h1{
        font-size:26px;
    }

    .product-image{
        width:65px;
        height:65px;
    }

    .product-name{
        font-size:15px;
    }

    .product-commission{
        font-size:18px;
    }

    button,
    .btn-buy{
        font-size:17px;
    }

}

</style>
</head>

<body>

<div class="container">

<h1>Tạo Link Hoàn Tiền</h1>

<input
type="text"
id="shopeeLink"
placeholder="Nhập link sản phẩm Shopee..."
>
<input
    type="text"
    id="subId"
    placeholder="Nhập số Zalo..."
    style="margin-top:8px;"
>
<button
id="generateBtn"
onclick="generateAffLink()">
Tạo Link Ngay
</button>

<div
class="result-box"
id="resultBox">

<div
class="product-card"
id="productCard">

   <div class="product-card-content">

    <img
        id="productImage"
        class="product-image"
        src="https://placehold.co/90x90?text=Shopee"
    >

    <div class="product-detail">

    <div
        class="product-name"
        id="productName">
        Đang tải...
    </div>

    <div
        class="product-price"
        id="productPrice">
        --
    </div>

</div>
</div>

<div
    class="product-commission"
    id="productCommission">
    💰 Hoàn tiền dự kiến: --
</div>

</div>

<p
class="status-text"
id="statusText">
⏳ Đang xử lý...
</p>

<input
type="hidden"
id="outputLink">

<button
id="copyBtn"
class="btn-copy"
onclick="copyToClipboard()"
disabled>
Đang xử lý...
</button>

<a
id="buyBtn"
class="btn-buy"
href="#"
target="_blank"
style="display:none;">
🛒 Mua ngay
</a>

</div>

</div>

<script>

let isLoading=false;
let buyLink="";

async function generateAffLink(){

    if(isLoading) return;

    let inputLink=document.getElementById("shopeeLink").value.trim();
    let subId=document.getElementById("subId").value.trim();

if(subId===""){
    subId="caback";      // Sub ID mặc định
}

    if(!inputLink){
        alert("Vui lòng nhập link Shopee");
        return;
    }

    if(!inputLink.startsWith("http")){
        inputLink="https://"+inputLink;
    }

    isLoading=true;

    const btn=document.getElementById("generateBtn");
    const resultBox=document.getElementById("resultBox");
    const statusText=document.getElementById("statusText");
    const output=document.getElementById("outputLink");
    const copyBtn=document.getElementById("copyBtn");
    const buyBtn=document.getElementById("buyBtn");
    const productCard=document.getElementById("productCard");
    const productImage=document.getElementById("productImage");
    const productName=document.getElementById("productName");
    const productCommission=document.getElementById("productCommission");
    const productPrice=document.getElementById("productPrice");

    btn.disabled=true;
    btn.innerText="Đang xử lý...";

    resultBox.style.display="block";
productCard.style.display="none";

productImage.src="https://placehold.co/90x90?text=Shopee";

productName.innerText="Đang tải thông tin sản phẩm...";

productPrice.innerText="";

productCommission.innerText="💰 Hoàn tiền dự kiến: --";
    statusText.innerText="⏳ Đang xử lý link...";
statusText.style.display="block";
    copyBtn.disabled=true;
    buyBtn.style.display="none";

    try{

       const res = await fetch(
    "https://shopee.sanmakol.com",
    {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
    url: inputLink,
    sub_id: subId
})
    }
);

const data = await res.json();
// Hiển thị thông tin sản phẩm nếu Worker trả về

if(data.data.image){

    productCard.style.display="block";

productImage.src =
    data.data.image ||
    "https://placehold.co/90x90?text=Shopee";

productName.innerText =
    data.data.name;

productPrice.innerText =
    "💵 Giá: " +
    Number(data.data.price)
        .toLocaleString("vi-VN") +
    "đ";

productCommission.innerText =
    "💰 Hoàn tiền dự kiến: " +
    Number(data.data.commission)
        .toLocaleString("vi-VN") +
    "đ";

}else{

    productCard.style.display="none";

}
if (!data.success) {
    throw new Error(data.error);
}

// Nội dung để copy
output.value = data.data.copyText;

// Link nút Mua ngay
buyBtn.href = data.data.buyLink;
buyBtn.style.display = "block";

statusText.innerText="";
statusText.style.display="none";

copyBtn.disabled = false;
copyBtn.innerText = "📋 Sao chép";

    }catch(err){

        console.log(err);

        statusText.innerText="❌ Không xử lý được link";
        statusText.style.display="block";

productCard.style.display="none";

    }

    isLoading=false;

    btn.disabled=false;
    btn.innerText="Tạo Link Ngay";

}

function copyToClipboard(){

    navigator.clipboard.writeText(
        document.getElementById("outputLink").value
    );

    alert("Đã sao chép!");

}

</script>

</body>
</html>
